name: Demo

# Builds the interactive preview harness (dev/) into a static site and publishes
# it to GitHub Pages, so the README's "Live demo" link always tracks main. The
# card is bundled with hand-built `hass` fixtures, so the demo runs entirely in
# the browser with no Home Assistant behind it.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run demo
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
