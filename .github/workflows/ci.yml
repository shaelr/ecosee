name: CI

# Runs the project's quality gate on every PR and on pushes to main, so each PR
# shows a single green/red signal without anyone running tools by hand.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
