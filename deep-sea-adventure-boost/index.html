<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deep Sea Adventure · Air Supply</title>
<style>
  :root {
    --surface: #8fe3f0;
    --sea-1: #1c74a8;
    --sea-2: #0d4d78;
    --sea-3: #072f4c;
    --abyss: #041a2b;
    --sub-body: #ffd23f;
    --sub-shade: #f0a91f;
    --sub-trim: #e8503a;
    --glass: #b6f0ff;
    --glass-deep: #3aa7c9;
    --ink: #052235;
    --foam: rgba(226, 250, 255, 0.92);
    --danger: #ff4646;
    --danger-glow: rgba(255, 70, 70, 0.55);
    --panel: rgba(4, 30, 50, 0.55);
    font-family: ui-rounded, "SF Pro Rounded", "Nunito", "Segoe UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    /* Let short / landscape viewports scroll instead of clipping the controls;
       still block sideways scroll from drifting bubbles. */
    overflow-x: hidden;
  }

  body {
    color: var(--foam);
    background: var(--abyss);
  }

  .ocean {
    position: relative;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    background: linear-gradient(
      180deg,
      var(--surface) 0%,
      var(--sea-1) 14%,
      var(--sea-2) 42%,
      var(--sea-3) 72%,
      var(--abyss) 100%
    );
  }

  /* sunlight rays filtering down from the surface */
  .rays {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.35;
    background:
      linear-gradient(115deg, transparent 44%, rgba(255,255,255,0.18) 48%, transparent 52%),
      linear-gradient(80deg, transparent 60%, rgba(255,255,255,0.12) 64%, transparent 68%),
      linear-gradient(100deg, transparent 20%, rgba(255,255,255,0.10) 25%, transparent 30%);
    mix-blend-mode: screen;
  }

  /* soft waterline shimmer at the very top */
  .waterline {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 46px;
    background: linear-gradient(180deg, rgba(255,255,255,0.55), transparent);
    opacity: 0.6;
    pointer-events: none;
  }

  .scene {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 22px 16px 34px;
  }

  .title {
    text-align: center;
    margin: 4px 0 2px;
    text-shadow: 0 2px 0 rgba(4,30,50,0.35);
  }
  .title h1 {
    margin: 0;
    font-size: clamp(1.05rem, 3.2vw, 1.7rem);
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  .title p {
    margin: 2px 0 0;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    text-transform: uppercase;
    letter-spacing: 2.5px;
    opacity: 0.8;
  }

  /* ---- Submarine + hoses ---- */
  .sub-stage {
    position: relative;
    width: min(560px, 92vw);
    margin-top: 6px;
    flex: 0 0 auto;
  }
  .sub-svg { display: block; width: 100%; height: auto; overflow: visible; }

  .sub-float { transform-box: fill-box; transform-origin: center; }
  @media (prefers-reduced-motion: no-preference) {
    .sub-float { animation: bob 4.6s ease-in-out infinite; }
    .propeller { animation: spin 1.1s linear infinite; transform-box: fill-box; transform-origin: center; }
    .hose-sway { animation: sway 5.4s ease-in-out infinite; transform-box: fill-box; transform-origin: top center; }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-1.2deg); }
    50%      { transform: translateY(-12px) rotate(1.2deg); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  /* ---- Gauge / counter ---- */
  .gauge {
    position: relative;
    z-index: 4;
    margin-top: 10px;
    width: clamp(150px, 38vw, 210px);
    aspect-ratio: 1;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 34% 30%, rgba(255,255,255,0.35), transparent 42%),
      radial-gradient(circle at 50% 55%, #0a4468, #04243a 78%);
    border: 10px solid var(--sub-body);
    box-shadow:
      0 0 0 5px var(--sub-shade),
      0 18px 40px rgba(2, 18, 30, 0.6),
      inset 0 0 34px rgba(3, 22, 38, 0.9);
  }
  .gauge::before {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 2px dashed rgba(182, 240, 255, 0.28);
  }
  .gauge-label {
    position: absolute;
    top: 22%;
    font-size: 0.62rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .count {
    font-size: clamp(3.6rem, 12vw, 5.6rem);
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--glass);
    text-shadow: 0 0 18px rgba(120, 226, 255, 0.55);
    transition: color 0.35s ease, text-shadow 0.35s ease;
  }
  .gauge-unit {
    position: absolute;
    bottom: 20%;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .gauge.empty { border-color: var(--danger); box-shadow: 0 0 0 5px #b32020, 0 18px 40px rgba(2,18,30,0.6), inset 0 0 34px rgba(60,4,4,0.9); }
  .gauge.empty .count {
    color: var(--danger);
    text-shadow: 0 0 22px var(--danger-glow);
  }
  @media (prefers-reduced-motion: no-preference) {
    .gauge.empty .count { animation: alarm 0.9s ease-in-out infinite; }
  }
  @keyframes alarm {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  .pop { animation: pop 0.28s ease; }
  @keyframes pop {
    0% { transform: scale(1); }
    45% { transform: scale(1.16); }
    100% { transform: scale(1); }
  }

  /* ---- Controls ---- */
  .controls {
    z-index: 4;
    margin-top: 22px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-family: inherit;
    font-weight: 800;
    cursor: pointer;
    border: none;
    border-radius: 18px;
    padding: 15px 26px 17px;
    font-size: clamp(0.95rem, 2.6vw, 1.15rem);
    color: var(--ink);
    letter-spacing: 0.4px;
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    gap: 4px;
  }
  button small {
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.72;
  }
  button:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
  button:active { transform: translateY(3px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.4); }

  .btn-dive {
    background: linear-gradient(180deg, #8fe3f0, #46b7d8);
    box-shadow: 0 6px 0 #2f8bab, 0 12px 22px rgba(2,18,30,0.4);
  }
  .btn-dive:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 0 #2f8bab, 0 16px 26px rgba(2,18,30,0.45); }
  .btn-dive:not(:disabled):active { box-shadow: 0 3px 0 #2f8bab, 0 6px 14px rgba(2,18,30,0.4); }

  .btn-boost {
    background: linear-gradient(180deg, #ffd23f, #f0a91f);
    box-shadow: 0 6px 0 #c9861a, 0 12px 22px rgba(2,18,30,0.4);
  }
  .btn-boost:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 0 #c9861a, 0 16px 26px rgba(2,18,30,0.45); }
  .btn-boost:not(:disabled):active { box-shadow: 0 3px 0 #c9861a, 0 6px 14px rgba(2,18,30,0.4); }

  .btn-reset {
    background: linear-gradient(180deg, #ff7a7a, #e8503a);
    color: #fff;
    box-shadow: 0 6px 0 #b3341f, 0 12px 22px rgba(2,18,30,0.4);
    animation: reset-in 0.4s cubic-bezier(0.2, 1.4, 0.5, 1) both;
  }
  .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #b3341f, 0 16px 26px rgba(2,18,30,0.45); }
  @keyframes reset-in {
    from { opacity: 0; transform: scale(0.4) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .hidden { display: none !important; }

  .status {
    z-index: 4;
    margin-top: 14px;
    min-height: 1.4em;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
    opacity: 0.9;
    text-align: center;
  }
  .status.warn { color: var(--sub-body); font-weight: 700; }
  .status.out  { color: var(--danger); font-weight: 800; letter-spacing: 1px; }

  /* ---- Bubbles ---- */
  .bubbles {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    bottom: -40px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95), rgba(255,255,255,0.15) 45%, rgba(255,255,255,0.04) 70%);
    border: 1px solid rgba(255,255,255,0.35);
    will-change: transform, opacity;
    animation-name: rise;
    animation-timing-function: ease-in;
    animation-iteration-count: 1;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
    12%  { opacity: 0.9; }
    80%  { opacity: 0.85; }
    100% { transform: translateY(-102vh) translateX(var(--drift, 20px)) scale(1); opacity: 0; }
  }

  .footer-note {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    text-align: center;
    z-index: 4;
    font-size: 0.68rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.5;
  }

  /* Short / landscape viewports: shrink the scene so the controls stay in reach
     (and the page can still scroll if it doesn't quite fit). */
  @media (max-height: 640px) {
    .scene { padding-top: 12px; }
    .title { margin: 0; }
    .sub-stage { width: min(360px, 62vw); margin-top: 2px; }
    .gauge { width: clamp(120px, 22vh, 168px); margin-top: 4px; }
    .controls { margin-top: 14px; }
    .footer-note { display: none; }
  }
</style>
</head>
<body>
  <div class="ocean">
    <div class="waterline"></div>
    <div class="rays"></div>
    <div class="bubbles" id="bubbles" aria-hidden="true"></div>

    <div class="scene">
      <div class="title">
        <h1>Deep Sea Adventure</h1>
        <p>Shared Air Supply</p>
      </div>

      <div class="sub-stage">
        <svg class="sub-svg" viewBox="0 0 560 300" role="img" aria-label="Cartoon submarine with air hoses trailing down into the ocean">
          <!-- Hoses trailing down from the sub into the deep -->
          <g class="hose-sway" fill="none" stroke-linecap="round">
            <path d="M215 168 C 195 210, 240 250, 210 300" stroke="#0a3b58" stroke-width="9" opacity="0.85"/>
            <path d="M215 168 C 195 210, 240 250, 210 300" stroke="#2f7fa3" stroke-width="4" stroke-dasharray="2 12" opacity="0.7"/>
            <path d="M330 172 C 360 214, 315 252, 350 300" stroke="#0a3b58" stroke-width="9" opacity="0.85"/>
            <path d="M330 172 C 360 214, 315 252, 350 300" stroke="#2f7fa3" stroke-width="4" stroke-dasharray="2 12" opacity="0.7"/>
          </g>

          <g class="sub-float">
            <!-- tail fin -->
            <path d="M78 150 L30 120 L34 150 L30 180 Z" fill="#e8503a"/>
            <!-- propeller -->
            <g class="propeller">
              <circle cx="70" cy="150" r="5" fill="#c9861a"/>
              <ellipse cx="70" cy="132" rx="7" ry="16" fill="#f0a91f"/>
              <ellipse cx="70" cy="168" rx="7" ry="16" fill="#f0a91f"/>
              <ellipse cx="52" cy="150" rx="16" ry="7" fill="#ffd23f"/>
              <ellipse cx="88" cy="150" rx="16" ry="7" fill="#ffd23f"/>
              <circle cx="70" cy="150" r="6" fill="#c9861a"/>
            </g>

            <!-- body -->
            <ellipse cx="300" cy="150" rx="205" ry="78" fill="#ffd23f"/>
            <ellipse cx="300" cy="150" rx="205" ry="78" fill="none" stroke="#f0a91f" stroke-width="6"/>
            <!-- belly shade -->
            <path d="M110 175 A205 78 0 0 0 490 175 A205 60 0 0 1 110 175 Z" fill="#f0a91f" opacity="0.55"/>
            <!-- top highlight -->
            <ellipse cx="270" cy="118" rx="120" ry="26" fill="#ffe58a" opacity="0.7"/>
            <!-- red trim stripe -->
            <path d="M300 72 A205 78 0 0 1 300 228" fill="none" stroke="#e8503a" stroke-width="10" opacity="0.9"/>

            <!-- conning tower -->
            <rect x="272" y="58" width="66" height="42" rx="14" fill="#f0a91f"/>
            <rect x="272" y="58" width="66" height="42" rx="14" fill="none" stroke="#c9861a" stroke-width="4"/>
            <!-- periscope -->
            <rect x="300" y="30" width="9" height="34" rx="4" fill="#c9861a"/>
            <rect x="300" y="30" width="24" height="9" rx="4" fill="#e8503a"/>

            <!-- portholes -->
            <g>
              <circle cx="222" cy="150" r="30" fill="#0a4468"/>
              <circle cx="222" cy="150" r="30" fill="none" stroke="#c9861a" stroke-width="7"/>
              <circle cx="222" cy="150" r="24" fill="#3aa7c9"/>
              <circle cx="213" cy="141" r="8" fill="#b6f0ff" opacity="0.85"/>
            </g>
            <g>
              <circle cx="330" cy="150" r="30" fill="#0a4468"/>
              <circle cx="330" cy="150" r="30" fill="none" stroke="#c9861a" stroke-width="7"/>
              <circle cx="330" cy="150" r="24" fill="#3aa7c9"/>
              <circle cx="321" cy="141" r="8" fill="#b6f0ff" opacity="0.85"/>
            </g>

            <!-- nose cap -->
            <path d="M470 108 A78 78 0 0 1 470 192 Z" fill="#e8503a"/>
            <circle cx="486" cy="150" r="6" fill="#ffd23f"/>

            <!-- little air valves where hoses attach -->
            <circle cx="215" cy="168" r="7" fill="#c9861a"/>
            <circle cx="330" cy="172" r="7" fill="#c9861a"/>
          </g>
        </svg>
      </div>

      <div class="gauge" id="gauge">
        <span class="gauge-label">Oxygen</span>
        <span class="count" id="count">25</span>
        <span class="gauge-unit">units</span>
      </div>

      <div class="controls">
        <button class="btn-dive" id="dive" type="button">
          Dive <small>&minus;1 air</small>
        </button>
        <button class="btn-boost" id="boost" type="button">
          Boost <small>&minus;2 air</small>
        </button>
        <button class="btn-reset hidden" id="reset" type="button">
          Resurface <small>Reset to 25</small>
        </button>
      </div>

      <div class="status" id="status" role="status" aria-live="polite">Air is flowing. Descend carefully!</div>
    </div>

    <div class="footer-note">Board game companion · Deep Sea Adventure</div>
  </div>

<script>
  (function () {
    "use strict";

    var START = 25;
    var oxygen = START;

    var countEl = document.getElementById("count");
    var gaugeEl = document.getElementById("gauge");
    var statusEl = document.getElementById("status");
    var diveBtn = document.getElementById("dive");
    var boostBtn = document.getElementById("boost");
    var resetBtn = document.getElementById("reset");
    var bubbleLayer = document.getElementById("bubbles");

    var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var bubbleTimer = null;
    var running = true;

    function spawnBubble() {
      var b = document.createElement("div");
      b.className = "bubble";
      var size = 6 + Math.random() * 22;
      b.style.width = size + "px";
      b.style.height = size + "px";
      b.style.left = Math.random() * 100 + "vw";
      b.style.setProperty("--drift", (Math.random() * 80 - 40) + "px");
      var dur = 6 + Math.random() * 6;
      b.style.animationDuration = dur + "s";
      bubbleLayer.appendChild(b);
      // clean up once it has floated off screen
      window.setTimeout(function () {
        if (b.parentNode) b.parentNode.removeChild(b);
      }, dur * 1000 + 400);
    }

    function startBubbles() {
      if (reduceMotion || bubbleTimer !== null) return;
      // a gentle stream from the sea floor
      bubbleTimer = window.setInterval(spawnBubble, 320);
      for (var i = 0; i < 6; i++) spawnBubble();
    }

    function stopBubbles() {
      if (bubbleTimer !== null) {
        window.clearInterval(bubbleTimer);
        bubbleTimer = null;
      }
    }

    function popCount() {
      countEl.classList.remove("pop");
      // force reflow so the animation can replay
      void countEl.offsetWidth;
      countEl.classList.add("pop");
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = "status" + (cls ? " " + cls : "");
    }

    function render() {
      countEl.textContent = oxygen;

      if (oxygen <= 0) {
        running = false;
        gaugeEl.classList.add("empty");
        stopBubbles();
        diveBtn.disabled = true;
        boostBtn.disabled = true;
        resetBtn.classList.remove("hidden");
        setStatus("Out of air! The dive is over.", "out");
      } else if (oxygen <= 5) {
        setStatus("Air running low — " + oxygen + " left!", "warn");
      } else {
        setStatus("Air is flowing. Descend carefully!", "");
      }
    }

    function consume(amount) {
      if (!running) return;
      oxygen = Math.max(0, oxygen - amount);
      popCount();
      render();
    }

    function reset() {
      oxygen = START;
      running = true;
      gaugeEl.classList.remove("empty");
      diveBtn.disabled = false;
      boostBtn.disabled = false;
      resetBtn.classList.add("hidden");
      startBubbles();
      popCount();
      render();
    }

    diveBtn.addEventListener("click", function () { consume(1); });
    boostBtn.addEventListener("click", function () { consume(2); });
    resetBtn.addEventListener("click", reset);

    startBubbles();
    render();
  })();
</script>
</body>
</html>
